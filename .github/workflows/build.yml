name: Sync, Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest upstream tag
        id: sync
        run: |
          git remote add upstream https://github.com/Auxilor/eco.git || true
          git fetch upstream --tags

          UPSTREAM_TAG=$(git ls-remote --refs --tags upstream | awk -F/ '{print $3}' | sort -V | tail -n1)
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Could not resolve upstream tag."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$UPSTREAM_TAG" > /dev/null 2>&1; then
            echo "Latest upstream tag ($UPSTREAM_TAG) already exists on origin. Skipping build and release."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "Building latest upstream tag: $UPSTREAM_TAG"
            git checkout --detach "tags/$UPSTREAM_TAG"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi
        
      - name: Set up JDK 21
        if: steps.sync.outputs.has_update == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle cache
        if: steps.sync.outputs.has_update == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Get Project Version
        id: version
        if: steps.sync.outputs.has_update == 'true'
        run: |
          VERSION="${{ steps.sync.outputs.upstream_tag }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$VERSION (Auto Build)" >> $GITHUB_OUTPUT

      - name: Build
        if: steps.sync.outputs.has_update == 'true'
        run: ./gradlew clean shadowJar --no-daemon

      - name: Add stable download filename
        if: steps.sync.outputs.has_update == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          jars=(build/libs/eco-*-all.jar)
          if [ "${#jars[@]}" -ne 1 ]; then
            echo "Expected exactly one eco-*-all.jar, got: ${jars[*]-none}"
            exit 1
          fi
          cp "${jars[0]}" build/libs/eco-all.jar

      - name: Verify artifact
        if: steps.sync.outputs.has_update == 'true'
        run: |
          ls -lh build/libs/*-all.jar
          sha256sum build/libs/*-all.jar

      - name: Create Release
        if: steps.sync.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: |
            build/libs/eco-*-all.jar
            build/libs/eco-all.jar
          body: |
            Auto-generated build from upstream release tag v${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: repo secret DISCORD_WEBHOOK_URL — Incoming Webhook URL from Discord channel settings.
      - name: Notify Discord
        if: steps.sync.outputs.has_update == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Skipping Discord (set repository secret DISCORD_WEBHOOK_URL to enable)."
            exit 0
          fi
          python3 << 'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          repo = os.environ["REPO"]
          base = f"https://github.com/{repo}"
          dl_stable = f"{base}/releases/latest/download/eco-all.jar"
          dl_versioned = f"{base}/releases/download/{version}/eco-{version}-all.jar"
          release = f"{base}/releases/tag/{version}"

          payload = {
              "username": "Auto Build",
              "embeds": [
                  {
                      "title": f"eco {version}",
                      "description": (
                          f"**Download (one-click)** — [eco-all.jar]({dl_stable})\n"
                          f"**Versioned file** — [eco-{version}-all.jar]({dl_versioned})\n"
                          f"**Release** — {release}"
                      ),
                      "color": 5763719,
                  }
              ],
          }
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  if resp.status not in (200, 204):
                      raise SystemExit(f"Discord webhook HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              raise SystemExit(f"Discord webhook failed: {e.code} {e.read().decode(errors='replace')}") from e
          PY
