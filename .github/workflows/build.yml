name: Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

concurrency:
  group: auto-build-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Sync from upstream (changed files only)
        id: sync
        env:
          UPSTREAM_URL: https://github.com/Auxilor/eco.git
        run: bash .github/scripts/sync-upstream.sh

      - name: Set up JDK 21
        if: steps.sync.outputs.run_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle cache
        if: steps.sync.outputs.run_build == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        if: steps.sync.outputs.run_build == 'true'
        run: ./gradlew clean shadowJar --no-daemon

      - name: Verify artifact
        if: steps.sync.outputs.run_build == 'true'
        run: |
          ls -lh build/libs/*-all.jar
          sha256sum build/libs/*-all.jar

      - name: Commit sync and push
        id: publish
        if: steps.sync.outputs.has_update == 'true' || steps.sync.outputs.has_update == 'pointer'
        env:
          DEFAULT_BRANCH: ${{ steps.sync.outputs.default_branch }}
          HAS_UPDATE: ${{ steps.sync.outputs.has_update }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: bash .github/scripts/commit-sync.sh

      - name: Create Release
        if: steps.sync.outputs.run_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sync.outputs.tag_name }}
          name: ${{ steps.sync.outputs.release_name }}
          target_commitish: ${{ steps.publish.outputs.head_sha }}
          files: build/libs/*-all.jar
          body: |
            Auto-generated build from upstream Auxilor/eco @ ${{ steps.sync.outputs.upstream_sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
