name: Auto Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

concurrency:
  group: auto-build-${{ github.repository }}
  cancel-in-progress: false

env:
  PLUGIN_NAME: eco

jobs:
  stable-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest upstream tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add upstream https://github.com/Auxilor/${{ env.PLUGIN_NAME }}.git || true
          git fetch upstream --tags --force
          
          LATEST_TAG=$(git ls-remote --refs --tags upstream | awk -F/ '{print $3}' | grep -E '^[0-9]|v[0-9]' | sort -V | tail -n1)
          echo "Latest upstream tag: $LATEST_TAG"
          
          RELEASE_INFO=$(gh release view "$LATEST_TAG" --json isPrerelease --jq .isPrerelease 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$RELEASE_INFO" = "false" ]; then
            echo "Stable release for $LATEST_TAG already exists. Skipping."
            echo "run_build=false" >> $GITHUB_OUTPUT
          else
            echo "run_build=true" >> $GITHUB_OUTPUT
            echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
            git checkout "tags/$LATEST_TAG"
            VERSION=$(grep -E '^version[[:space:]]*=' gradle.properties | head -1 | sed 's/^[^=]*=[[:space:]]*//;s/[[:space:]]*$//;s/#.*//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            SHA=$(git rev-parse HEAD)
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.check.outputs.run_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle cache
        if: steps.check.outputs.run_build == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        id: build
        if: steps.check.outputs.run_build == 'true'
        run: |
          # Try building the checked-out tag
          if ./gradlew clean build shadowJar --no-daemon; then
            echo "fallback=false" >> $GITHUB_OUTPUT
            echo "version=${{ steps.check.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "Stable build for tag ${{ steps.check.outputs.tag_name }} failed. Falling back to master branch."
            git checkout master
            ./gradlew clean build shadowJar --no-daemon
            VERSION=$(grep -E '^version[[:space:]]*=' gradle.properties | head -1 | sed 's/^[^=]*=[[:space:]]*//;s/[[:space:]]*$//;s/#.*//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "fallback=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Stable Release
        if: steps.check.outputs.run_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag_name }}
          name: ${{ steps.build.outputs.version }} (Stable Build)
          files: build/libs/*-all.jar
          prerelease: false
          make_latest: true
          body: |
            ## [STABLE] ${{ env.PLUGIN_NAME }} — v${{ steps.build.outputs.version }} ${{ steps.build.outputs.fallback == 'true' && '(Fallback Build)' || '' }}
            Auto-generated stable build from upstream tag `${{ steps.check.outputs.tag_name }}`.
            ${{ steps.build.outputs.fallback == 'true' && '> The build for the original tag failed. This release was generated using the latest development code as a fallback.' || '' }}

            **Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord (Stable)
        if: success() && steps.check.outputs.run_build == 'true'
        env:
          NOTIFY_API_URL: ${{ secrets.NOTIFY_API_URL }}
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          TAG_NAME: ${{ steps.check.outputs.tag_name }}
          VERSION: ${{ steps.build.outputs.version }}
          UP_SHA: ${{ steps.check.outputs.sha }}
        run: |
          if [ -z "${NOTIFY_API_URL:-}" ]; then exit 0; fi
          rel_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"
          dl_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${{ env.PLUGIN_NAME }}-${VERSION}-all.jar"
          payload=$(jq -cn \
            --arg plugin_name "${{ env.PLUGIN_NAME }}" \
            --arg status "stable" \
            --arg version "$VERSION" \
            --arg tag "$TAG_NAME" \
            --arg upstream_sha "$UP_SHA" \
            --arg release_url "$rel_url" \
            --arg download_url "$dl_url" \
            --arg repository "$GITHUB_REPOSITORY" \
            '{
              plugin_name: $plugin_name,
              status: $status,
              version: $version,
              tag: $tag,
              upstream_sha: $upstream_sha,
              release_url: $release_url,
              download_url: $download_url,
              repository: $repository
            }')
          signature=$(echo -n "$payload" | openssl dgst -sha256 -hmac "$NOTIFY_API_KEY" | sed 's/^.*= //')
          echo "$payload" | curl -fsS -X POST -H "Content-Type: application/json" -H "x-api-signature: $signature" -d @- "$NOTIFY_API_URL"

  dev-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false

      - name: Sync from upstream (Dev)
        id: sync
        env:
          UPSTREAM_URL: https://github.com/Auxilor/${{ env.PLUGIN_NAME }}.git
        run: bash .github/scripts/sync-upstream.sh

      - name: Set up JDK 21
        if: steps.sync.outputs.run_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle cache
        if: steps.sync.outputs.run_build == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        if: steps.sync.outputs.run_build == 'true'
        run: ./gradlew clean build shadowJar --no-daemon

      - name: Commit sync and push
        id: publish
        if: steps.sync.outputs.has_update == 'true' || steps.sync.outputs.has_update == 'pointer'
        env:
          DEFAULT_BRANCH: ${{ steps.sync.outputs.default_branch }}
          HAS_UPDATE: ${{ steps.sync.outputs.has_update }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: bash .github/scripts/commit-sync.sh

      - name: Create Dev Release
        if: steps.sync.outputs.run_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sync.outputs.tag_name }}
          name: ${{ steps.sync.outputs.release_name }}
          target_commitish: ${{ steps.publish.outputs.head_sha }}
          files: build/libs/*-all.jar
          prerelease: true
          make_latest: false
          body: |
            ## [DEV] ${{ env.PLUGIN_NAME }} — v${{ steps.sync.outputs.gradle_version }}
            Auto-generated development build from upstream master @ `${{ steps.sync.outputs.upstream_sha }}`.

            **Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord (Dev)
        if: success() && steps.sync.outputs.run_build == 'true'
        env:
          NOTIFY_API_URL: ${{ secrets.NOTIFY_API_URL }}
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          TAG_NAME: ${{ steps.sync.outputs.tag_name }}
          VERSION: ${{ steps.sync.outputs.gradle_version }}
          UP_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: |
          if [ -z "${NOTIFY_API_URL:-}" ]; then exit 0; fi
          rel_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"
          dl_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${{ env.PLUGIN_NAME }}-${VERSION}-all.jar"
          payload=$(jq -cn \
            --arg plugin_name "${{ env.PLUGIN_NAME }}" \
            --arg status "dev" \
            --arg version "$VERSION" \
            --arg tag "$TAG_NAME" \
            --arg upstream_sha "$UP_SHA" \
            --arg release_url "$rel_url" \
            --arg download_url "$dl_url" \
            --arg repository "$GITHUB_REPOSITORY" \
            '{
              plugin_name: $plugin_name,
              status: $status,
              version: $version,
              tag: $tag,
              upstream_sha: $upstream_sha,
              release_url: $release_url,
              download_url: $download_url,
              repository: $repository
            }')
          signature=$(echo -n "$payload" | openssl dgst -sha256 -hmac "$NOTIFY_API_KEY" | sed 's/^.*= //')
          echo "$payload" | curl -fsS -X POST -H "Content-Type: application/json" -H "x-api-signature: $signature" -d @- "$NOTIFY_API_URL"